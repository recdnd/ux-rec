<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>ux.rec.ooo — Rec Dungeons</title>
  <meta name="description" content="Interface showcase terminal — human–AI interaction experiments.">
  <link rel="icon" type="image/png" href="uxrec32.png" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/png" href="uxrec32-light.png" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/png" href="uxrec32.png">
  <link rel="stylesheet" href="css/portfolio.css">
</head>
<body>
  <header class="rec-hero" aria-label="Identity">
    <a class="rec-hero__link" href="https://rec.ooo/" aria-label="Go to rec.ooo">
      <h1 class="rec-hero__title">Rec Dungeons</h1>
      <div class="rec-hero__row">
        <p class="rec-hero__tagline">Designing interfaces for human–AI collaboration.</p>
        <span class="rec-hero__product">Spiral</span>
      </div>
    </a>
  </header>

  <div class="rec-root">
    <div class="rec-layout">
      <div class="rec-rail" id="rec-rail" role="list" aria-label="Selected work"></div>

      <aside class="rec-stage" aria-label="Preview">
        <div
          class="rec-display"
          id="rec-display"
          role="button"
          tabindex="0"
          data-idle="true"
          aria-label="Preview monitor. Use play on a case to start."
        >
          <span class="rec-display__signal" aria-hidden="true"></span>
          <div class="rec-display__viewport">
            <div class="rec-display__inner">
              <video
                class="rec-display__video"
                muted
                playsinline
                webkit-playsinline
                preload="auto"
                hidden></video>
              <img class="rec-display__image" alt="" hidden decoding="async" />
              <div class="rec-display__placeholder" hidden>
                <p class="rec-display__placeholder-text"></p>
              </div>
            </div>
          </div>
          <div class="rec-display__caption"></div>
        </div>
      </aside>
    </div>
  </div>

  <footer class="rec-foot" role="contentinfo">
    <nav class="rec-foot__inner" aria-label="System markers">
      <a class="rec-foot__item" href="https://spiral.ooo/">Spiral</a>
      <span class="rec-foot__dot" aria-hidden="true">·</span>
      <a class="rec-foot__item" href="https://ux.rec.ooo/">ux.rec.ooo</a>
      <span class="rec-foot__dot" aria-hidden="true">·</span>
      <a class="rec-foot__item" href="https://rec.ooo/">rec.ooo</a>
    </nav>
  </footer>

  <script src="js/portfolio.js"></script>
</body>
</html>
